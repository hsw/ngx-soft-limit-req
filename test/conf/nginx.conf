# Test config: load the module .so and exercise the tag-don't-reject handler.
# A low-rate soft_limit_req zone keyed on $host is attached to /soft so a flood
# can push the bucket far over rate; the module must still serve 200 for every
# request (never 503). The plain / location (no soft_limit_req) stays a trivial
# 200 baseline.
#
# IMPORTANT: the soft_limit_req handler runs in the PREACCESS phase. A `return`
# directive finalizes the request in the REWRITE phase (earlier), so a location
# served purely by `return 200` NEVER reaches PREACCESS and the handler never
# runs. The soft-limited locations therefore serve a STATIC file (content phase,
# which runs AFTER preaccess) so the handler actually executes. This mirrors the
# real use case where the location ends in proxy_pass (also content phase).

load_module /usr/lib/nginx/modules/ngx_http_soft_limit_req_module.so;

worker_processes  1;

error_log  /var/log/nginx/error.log  notice;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    access_log  off;

    # very low rate so a short flood overruns the bucket immediately.
    soft_limit_req_zone $host zone=perhost:10m rate=5r/s;
    soft_limit_req_zone $uri  zone=peruri:10m  rate=5r/s;

    # Lower-rate zones for the set=$var cases: each observation request dumps
    # headers (curl -D -) and post-processes, which slows the client loop below
    # 5r/s and lets that bucket drain. rate=1r/s overruns even a slow curl loop.
    soft_limit_req_zone $host zone=svhost:10m rate=1r/s;
    soft_limit_req_zone $uri  zone=svuri:10m  rate=1r/s;

    # Empty-key / verified-bypass zone (Task 7). Keyed on a REQUEST HEADER that
    # may be absent: when X-Soft-Key is missing the complex value is empty, so
    # the handler skips the zone (key.len == 0) and the verdict stays "" — the
    # request bypasses the soft limit entirely. This mirrors the real
    # verified-bypass design where an HMAC-validated cookie maps to an empty
    # soft-zone key so trusted traffic is never tagged or rerouted. A present,
    # non-empty key is accounted normally and tags "1" over budget. rate=1r/s so
    # a slow header-dumping curl loop still overruns the bucket.
    soft_limit_req_zone $http_x_soft_key zone=svkey:10m rate=1r/s;

    # --- Internal-redirect re-entry guard zone -------------------------------
    # Keyed on a request header so the test fully controls the bucket key.
    # rate=1r/s; the /redir location below uses burst=1 (== 1.000 excess units).
    # A single external request accounted ONCE leaves excess at 1.000 (NOT over,
    # excess > burst is false -> verdict ""). The SAME request accounted TWICE
    # (origin /redir + @redir_named redirect target, same zone) would leave
    # excess at 2.000 (> 1.000 -> verdict "1"). So the verdict observed on the
    # served (post-redirect) response directly reveals whether the re-entry guard
    # held: empty => accounted once across the redirect; "1" => double-counted.
    soft_limit_req_zone $http_x_redir_key zone=svredir:10m rate=1r/s;

    # --- Redirect-target-only zone (the common try_files -> @app pattern) ----
    # The soft_limit_req lives ONLY on the @named redirect TARGET; the entry
    # location has no limiter. Keyed on a request header so the test controls
    # the bucket key. rate=1r/s; the @app_only location uses burst=2 so a short
    # flood comfortably exceeds it and flips the verdict to "1" — proving the
    # limiter actually RUNS for a location reached only via internal redirect.
    soft_limit_req_zone $http_x_apponly_key zone=svapponly:10m rate=1r/s;

    # --- Bypass-entry-then-redirect-target zones (codex iter2 regression) ----
    # The ENTRY location carries a configured soft_limit_req (Zentry) keyed on a
    # request header that is ABSENT in the test request, so its key is empty and
    # the zone always bypasses (verified-bypass path, key.len == 0) WITHOUT
    # touching any bucket. try_files then forces an internal redirect to a
    # @redir_target that owns a REAL limiter (Zreal) keyed on $host (non-empty).
    # If the entry location's all-bypass pass consumed the once-per-request
    # marker, the redirect target would be skipped and never account. The marker
    # must therefore be consumed only after a real lookup. Zreal burst=2 so a
    # short flood flips its verdict to "1" once it actually accounts.
    soft_limit_req_zone $http_x_bypass_key zone=Zentry:10m rate=1r/s;
    soft_limit_req_zone $host              zone=Zreal:10m  rate=1r/s;

    # Minimum-size zone (8*pagesize, the parser floor) keyed on a high-cardinality
    # header (Task F3). Flooding thousands of DISTINCT keys forces continuous slab
    # eviction and eventually a slab-alloc failure -> *_lookup returns NGX_ERROR ->
    # the verdict stays "" -> the request is STILL served (never 503). This
    # exercises both *_expire eviction and the NGX_ERROR-stays-empty branch.
    soft_limit_req_zone $http_x_full_key zone=svfull:32k rate=1r/s;

    # --- Task 5: the real target shape -------------------------------------
    # STOCK limit_req keyed on the per-IP realip result (hard reject) coexists
    # in the SAME location as soft_limit_req keyed on $host (tag-don't-reject).
    #
    # Client IP control for the perip zone: the test cannot easily vary its
    # source address, so we trust an X-Forwarded-For header (set_real_ip_from
    # below) and key perip on the realip-resolved $remote_addr. Each test
    # request can therefore present a different "client IP" via XFF. This is a
    # TEST convenience — in production key perip on the real client IP after
    # realip from the trusted CDN/LB range only.
    #
    # rate=1r/s burst=5 nodelay: a back-to-back flood from ONE IP trips perip
    # within ~7 requests and returns 503 (stock still hard-rejects). Spreading
    # the same flood across MANY IPs keeps every perip bucket under budget, so
    # only the per-$host soft zone trips -> $over_host="1" -> routed to L2.
    #
    # perhost2 is rate=1r/s (NOT 5r/s): the case-40 client floods via
    # `curl -D -` (header dump), which runs at only ~6 req/s. At rate=5r/s the
    # bucket drained almost as fast as that slow loop filled it, leaving the
    # verdict hovering right at burst and the post-flood confirmation
    # non-deterministic. At 1r/s the slow loop overruns the bucket with a wide
    # margin, exactly like the other soft zones above, so the verdict is
    # reliably "1" once flooded.
    limit_req_zone        $remote_addr zone=perip:10m   rate=1r/s;
    soft_limit_req_zone   $host        zone=perhost2:10m rate=1r/s;

    # map the soft verdict to an upstream pool. NOTE: this MUST be a map, not an
    # `if`, because $over_host is written in PREACCESS (after rewrite). The map
    # is evaluated lazily when proxy_pass reads $pool in the CONTENT phase, by
    # which point PREACCESS has run and $over_host is populated. An `if
    # ($over_host)` in the location body runs in the REWRITE phase (before
    # preaccess) and would read empty — proven by the negative case below.
    map $over_host $pool {
        "~1"     quarantine_l2;
        default  main;
    }

    # Same verdict->pool mapping for the empty-key/verified-bypass case (Task 7),
    # driven by the svkey zone's $over_key. An empty X-Soft-Key header leaves
    # $over_key="" => routes to main (bypass); a present, over-budget key flips
    # it to "1" => routes to quarantine_l2.
    map $over_key $pool_key {
        "~1"     quarantine_l2;
        default  main;
    }

    # Two DISTINCT backends so the test can tell which pool served the request.
    # Both are plain server{} blocks in this same nginx instance on internal
    # ports, returning distinguishable bodies + an X-Pool header.
    upstream main          { server 127.0.0.1:8081; }
    upstream quarantine_l2 { server 127.0.0.1:8082; }

    # Trust XFF from anywhere (TEST ONLY) so the test can set the keyed IP.
    # In production restrict set_real_ip_from to the trusted proxy range.
    server {
        listen       80;
        server_name  _;

        set_real_ip_from 0.0.0.0/0;
        real_ip_header   X-Forwarded-For;

        # Static content root for the soft-limited locations. Serving a real
        # file routes through the content phase (after PREACCESS), so the
        # soft_limit_req handler runs. /static/ok.txt exists for every request.
        root /usr/share/test-html;

        # baseline / (no soft_limit_req) — return is fine here, no handler needed.
        location = / {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # soft-limited location: over rate must NOT reject (tag-don't-reject).
        # try_files serves the static file (content phase) so PREACCESS runs.
        # set=$over_host tags the verdict; case 20 asserts it flips to "1" under
        # flood WHILE every response stays 200 — tying never-reject to the
        # handler actually running. The verdict is echoed as "v=$over_host" so an
        # empty verdict is distinguishable from an absent header (nginx drops
        # empty-value headers, so "X-Over: " alone would vanish).
        location /soft {
            soft_limit_req zone=svhost burst=10 set=$over_host;
            add_header X-Over "v=$over_host" always;
            try_files /ok.txt =404;
        }

        # set=$var: the overflow verdict is echoed in a response header so the
        # integration cases can observe it flip ""->"1" and back.
        # The verdict is echoed as "v=$over_host" (not bare "$over_host") so the
        # case can tell an empty verdict (header present, value "v=") apart from
        # an absent header (nginx drops empty-value headers).
        location /setvar {
            soft_limit_req zone=svhost burst=10 set=$over_host;
            add_header X-Over "v=$over_host" always;
            try_files /ok.txt =404;
        }

        # two zones in one location, each with its own verdict variable.
        # $over_host keyed on $host, $over_uri keyed on $uri — independent.
        # Verdicts echoed as "v=$var" so empty (header present, "v=") is
        # distinguishable from absent (empty-value headers are dropped).
        location /multi {
            soft_limit_req zone=svhost burst=10 set=$over_host;
            soft_limit_req zone=svuri  burst=10 set=$over_uri;
            add_header X-Over-Host "v=$over_host" always;
            add_header X-Over-Uri  "v=$over_uri"  always;
            try_files /ok.txt =404;
        }

        # --- Task 7: empty-key / verified-bypass ---------------------------
        # The soft zone is keyed on the X-Soft-Key request header (svkey).
        # When the header is absent the key is empty, so the handler skips the
        # zone and $over_key stays "" no matter how hard the client floods —
        # the verified-bypass path. When the header is present the bucket is
        # accounted and flips $over_key to "1" once over budget. The map below
        # routes "1" -> quarantine_l2 so an empty key always reaches main.
        location /emptykey {
            soft_limit_req zone=svkey burst=10 set=$over_key;
            add_header X-Over-Key "v=$over_key" always;
            proxy_pass http://$pool_key;
        }

        # --- Task F3: zone-full / alloc-failure graceful degradation -------
        # Tiny zone (svfull, 32k) keyed on a high-cardinality header. A flood of
        # thousands of distinct keys saturates the slab; once *_lookup can't
        # allocate a node it returns NGX_ERROR, the verdict stays "" and the
        # request is served anyway (never 503). Echo the verdict so the case can
        # confirm it stayed empty on the degraded path.
        location /zonefull {
            soft_limit_req zone=svfull burst=10 set=$over_full;
            add_header X-Over-Full "v=$over_full" always;
            try_files /ok.txt =404;
        }

        # --- Internal-redirect re-entry guard ------------------------------
        # The origin location AND the @named redirect target both carry
        # soft_limit_req on the SAME zone (svredir, burst=1). try_files probes a
        # path that does NOT exist on disk (/no-such-file-$request_id is unique
        # per request and never a real file), so try_files falls back to
        # @redir_named via ngx_http_named_location() — a genuine internal
        # redirect that re-runs the PREACCESS phase for the redirected request.
        #
        # The handler accounts each external request exactly ONCE via a
        # once-per-request marker stored in r->variables (the internal
        # __soft_limit_req_seen slot, which SURVIVES the internal redirect
        # because neither ngx_http_internal_redirect() nor
        # ngx_http_named_location() touches r->variables). Pass 1 (external,
        # /redir): the marker is unset -> handler accounts once, excess 0 ->
        # 1.000, verdict "" (1.000 > 1.000 is false), and sets the marker after
        # charging the bucket. Pass 2 (@redir_named re-entry): the marker is
        # already set -> handler returns without re-accounting, so $over_redir
        # keeps its first-pass "". The served response (from @redir_named's
        # proxy_pass) echoes "v=$over_redir" — which stays "v=" iff the bucket
        # was accounted exactly once across the redirect.
        #
        # If the re-entry guard were ineffective (e.g. a self-ctx marker wiped
        # by the redirect's ngx_memzero(r->ctx, ...)), pass 2 would account a
        # SECOND time (excess -> 2.000 > 1.000), flipping $over_redir to "1" ->
        # "v=1" on the served response. The case asserts "v=" -> it FAILS if the
        # guard regresses.
        location /redir {
            soft_limit_req zone=svredir burst=1 set=$over_redir;
            try_files /no-such-file-$request_id @redir_named;
        }

        location @redir_named {
            soft_limit_req zone=svredir burst=1 set=$over_redir;
            add_header X-Over-Redir "v=$over_redir" always;
            proxy_pass http://main;
        }

        # --- Redirect-target-only soft_limit_req ---------------------------
        # The classic pattern: the ENTRY location has NO soft_limit_req and
        # falls through try_files to a @named location that DOES. The probed
        # path never exists (/no-such-...-$request_id is unique per request),
        # so try_files always falls back to @app_only via
        # ngx_http_named_location() — a genuine internal redirect that sets
        # r->internal = 1.
        #
        # With the old r->internal guard the handler would SKIP the only pass
        # that ever reaches the limiter (the redirect target is always
        # internal), so the bucket is never accounted and $over_app stays "".
        # With the redirect-surviving marker the handler runs once on this
        # request (the first PREACCESS pass for the redirected request) and the
        # bucket IS accounted — so a flood flips $over_app to "1".
        location /apponly {
            try_files /no-such-file-$request_id @app_only;
        }

        location @app_only {
            soft_limit_req zone=svapponly burst=2 set=$over_app;
            add_header X-Over-App "v=$over_app" always;
            proxy_pass http://main;
        }

        # --- Bypass-entry-then-redirect-target (codex iter2 regression) ----
        # The ENTRY location HAS a configured soft_limit_req (Zentry) but keyed
        # on $http_x_bypass_key, which is ABSENT in the test request -> empty key
        # -> that zone bypasses without touching any bucket. try_files probes a
        # path that never exists, forcing an internal redirect to @redir_target
        # which owns a REAL limiter (Zreal, keyed on $host, burst=2).
        #
        # If the entry's all-bypass pass consumes the once-per-request marker
        # (the marker-too-early bug), @redir_target is SKIPPED and $o_target
        # stays "" forever no matter the flood. With the fix the marker is only
        # consumed after a real lookup, so the entry bypass leaves the budget and
        # @redir_target accounts -> a flood flips $o_target to "1".
        location /bypassentry {
            soft_limit_req zone=Zentry burst=5 set=$o_entry;
            add_header X-Over-Entry "v=$o_entry" always;
            try_files /no-such-file-$request_id @redir_target;
        }

        location @redir_target {
            soft_limit_req zone=Zreal burst=2 set=$o_target;
            add_header X-Over-Target "v=$o_target" always;
            proxy_pass http://main;
        }

        # --- Task 5: coexistence + map routing -----------------------------
        # ONE location with BOTH limiters:
        #   - stock limit_req zone=perip: hard-rejects abusive IPs with 503
        #   - soft_limit_req zone=perhost2 set=$over_host: tags over-cap hosts
        # The verdict feeds the map -> $pool -> proxy_pass http://$pool, so an
        # over-cap host (that did NOT trip the per-IP hard limit) is routed to
        # quarantine_l2 with a 200, never an error.
        location /route {
            limit_req      zone=perip burst=5 nodelay;
            soft_limit_req zone=perhost2 burst=10 set=$over_host;
            proxy_pass http://$pool;
        }

        # --- Task 5: negative phase-order check ----------------------------
        # Same soft limiter, but the verdict is consumed via `if` in the
        # location body (REWRITE phase). $over_host is written later, in
        # PREACCESS, so the `if` ALWAYS reads empty and NEVER fires 444 — even
        # under a flood that would set $over_host="1" by content phase. This
        # documents the map-not-if caveat as an executable assertion.
        location /route-if {
            soft_limit_req zone=perhost2 burst=10 set=$over_host;
            if ($over_host) { return 444; }
            proxy_pass http://main;
        }
    }

    # Backend "main" — the normal pool. Distinct body + X-Pool: main.
    server {
        listen       8081;
        server_name  _;
        location / {
            add_header X-Pool main always;
            add_header Content-Type text/plain;
            return 200 "served-by-main\n";
        }
    }

    # Backend "quarantine_l2" — the sacrificial/challenge pool. Distinct
    # body + X-Pool: quarantine_l2 so the test can confirm the soft verdict
    # rerouted the request here.
    server {
        listen       8082;
        server_name  _;
        location / {
            add_header X-Pool quarantine_l2 always;
            add_header Content-Type text/plain;
            return 200 "served-by-quarantine_l2\n";
        }
    }
}
